<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgriNexus - Smart Field Mapping</title>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="https://unpkg.com/@maplibre/maplibre-gl-draw@1.5.0/dist/maplibre-gl-draw.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Inter, system-ui, sans-serif; background: #0f172a; color: #fff; }
        .hero-container { position: relative; height: 100svh; min-height: 620px; width: 100%; overflow: hidden; }
        #hero-map { position: absolute; inset: 0; z-index: 1; }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, #10b981, transparent); box-shadow: 0 0 20px #10b981; animation: scan 4s linear infinite; z-index: 2; pointer-events: none; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .time-control-panel { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); padding: 20px 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 600px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .time-slider { width: 100%; height: 6px; border-radius: 3px; background: linear-gradient(90deg, #1e293b 0%, #10b981 50%, #1e293b 100%); outline: none; -webkit-appearance: none; appearance: none; }
        .time-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #10b981; border: 3px solid #fff; box-shadow: 0 0 20px rgba(16,185,129,.6); }
        .time-labels { display: flex; justify-content: space-between; margin-top: 10px; font-size: .85rem; color: #94a3b8; }
        .time-labels span.active { color: #10b981; font-weight: 600; }
        .data-overlay { position: absolute; top: 100px; right: 40px; z-index: 10; width: 320px; }
        .data-card { background: rgba(15,23,42,.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 4px solid #10b981; }
        .field-watch-section { padding: 80px 40px; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); max-width: 1200px; margin: 0 auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px; }
        #field-map { height: 500px; border-radius: 16px; border: 2px solid rgba(255,255,255,.1); overflow: hidden; }
        .form-panel { display: flex; flex-direction: column; gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group input, .input-group select { padding: 12px 16px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; color: #fff; }
        .input-group select option { background: #0f172a; color: #fff; }
        .area-display { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); padding: 16px; border-radius: 8px; text-align: center; }
        .area-value { font-size: 2rem; font-weight: 700; color: #10b981; }
        .btn-primary { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #fff; border: 0; padding: 16px 32px; border-radius: 8px; font-weight: 600; cursor: pointer; min-height: 48px; }
        @media (max-width: 968px) {
            .hero-container { min-height: 700px; }
            .form-grid { grid-template-columns: 1fr; gap: 20px; }
            .data-overlay { right: 20px; top: 20px; width: calc(100% - 40px); }
            .data-card { padding: 14px; margin-bottom: 10px; }
            .time-control-panel { width: calc(100% - 24px); bottom: 12px; padding: 14px; }
            .time-labels { font-size: .72rem; gap: 8px; }
            .time-labels span { flex: 1; text-align: center; }
            .field-watch-section { padding: 28px 12px 40px; }
            #field-map { height: 360px; }
            .input-group input, .input-group select { min-height: 46px; font-size: 16px; }
        }
        @media (max-width: 640px) {
            .hero-container { min-height: 740px; }
            .scan-line { display: none; }
            .time-control-panel { position: absolute; bottom: max(10px, env(safe-area-inset-bottom, 0px)); }
        }
    </style>
</head>
<body>
<div class="hero-container">
    <div id="hero-map"></div>
    <div class="scan-line"></div>
    <div class="data-overlay">
        <div class="data-card"><strong>Добруджа Зона A</strong><div style="margin-top:8px;color:#10b981;">NDVI: 0.82</div></div>
    </div>
    <div class="time-control-panel">
        <div style="display:flex;justify-content:space-between;"><h3 style="font-size:1rem;">Времева Лента</h3><span id="current-date-display" style="color:#10b981;">Днес</span></div>
        <input type="range" min="0" max="2" value="0" class="time-slider" id="timeSlider" />
        <div class="time-labels"><span class="active" data-index="0">Днес (T-0)</span><span data-index="1">Преди седмица</span><span data-index="2">Преди месец</span></div>
    </div>
</div>
<div class="field-watch-section">
    <h2>Определете Вашето Поле</h2>
    <div class="form-grid">
        <div id="field-map"></div>
        <div class="form-panel">
            <div class="input-group"><label>Име на полето</label><input id="field-name" /></div>
            <div class="input-group"><label>Култура</label><select id="crop-type"><option value="">Изберете...</option><option value="wheat">Пшеница</option></select></div>
            <div class="area-display"><div class="area-value" id="calculated-area">0.00 дка</div></div>
            <div class="input-group"><label>Забележки</label><input id="field-notes" placeholder="Кратки бележки за полето..." /></div>
            <button class="btn-primary" id="save-btn">Запази Полето</button>
            <div id="save-status" style="font-size:.9rem;color:#94a3b8;min-height:22px;"></div>
        </div>
    </div>
</div>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@maplibre/maplibre-gl-draw@1.5.0/dist/maplibre-gl-draw.js"></script>
<script>
const DOBRUDJA_COORDS = [27.8, 43.6];
const SAVED_FIELDS_SOURCE_ID = "saved-fields-source";
const SAVED_FIELDS_FILL_LAYER_ID = "saved-fields-fill";
const SAVED_FIELDS_LINE_LAYER_ID = "saved-fields-line";
function rasterStyle() {
  return { version: 8, sources: { osm: { type: "raster", tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"], tileSize: 256 } }, layers: [{ id: "osm", type: "raster", source: "osm" }] };
}
const isSmallScreen = window.matchMedia("(max-width: 768px)").matches;
const heroMap = new maplibregl.Map({
  container: "hero-map",
  style: rasterStyle(),
  center: DOBRUDJA_COORDS,
  zoom: isSmallScreen ? 9.4 : 10,
  pitch: isSmallScreen ? 35 : 45,
  bearing: -20,
  dragRotate: !isSmallScreen,
  touchPitch: !isSmallScreen
});
heroMap.addControl(new maplibregl.NavigationControl());
const timeSlider = document.getElementById("timeSlider");
const dateDisplay = document.getElementById("current-date-display");
const labels = document.querySelectorAll(".time-labels span");
const timeData = [
  { label: "Днес (T-0)", layerId: "sentinel-t0", date: "2025-01-28" },
  { label: "Преди седмица (T-7)", layerId: "sentinel-t7", date: "2025-01-21" },
  { label: "Преди месец (T-30)", layerId: "sentinel-t30", date: "2024-12-28" }
];

function addHeroTimelapseLayers() {
  const layerDefs = [
    { id: "sentinel-t0", date: "2025-01-28" },
    { id: "sentinel-t7", date: "2025-01-21" },
    { id: "sentinel-t30", date: "2024-12-28" }
  ];
  for (const layer of layerDefs) {
    heroMap.addSource(layer.id, {
      type: "raster",
      tiles: [
        "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_CorrectedReflectance_TrueColor/default/" +
        layer.date +
        "/GoogleMapsCompatible_Level9/{z}/{y}/{x}.jpg"
      ],
      tileSize: 256
    });
    heroMap.addLayer({
      id: layer.id,
      type: "raster",
      source: layer.id,
      layout: { visibility: layer.id === "sentinel-t0" ? "visible" : "none" },
      paint: { "raster-opacity": 0.8 }
    });
  }
}

heroMap.on("load", () => {
  addHeroTimelapseLayers();
});

function setTimelapseVisibility(activeLayerId) {
  const ids = ["sentinel-t0", "sentinel-t7", "sentinel-t30"];
  ids.forEach((id) => {
    if (!heroMap.getLayer(id)) return;
    heroMap.setLayoutProperty(id, "visibility", id === activeLayerId ? "visible" : "none");
  });
}

timeSlider.addEventListener("input", (e) => {
  const index = Number.parseInt(e.target.value, 10);
  const selected = timeData[index];
  dateDisplay.textContent = selected.label;
  labels.forEach((x, i) => x.classList.toggle("active", i === index));
  // Hook for real Sentinel Hub integration:
  // heroMap.setLayoutProperty('sentinel-t0', 'visibility', 'visible');
  // При реална интеграция тук се сменят raster tile слоевете от Sentinel Hub.
  setTimelapseVisibility(selected.layerId);
});
const fieldMap = new maplibregl.Map({
  container: "field-map",
  style: rasterStyle(),
  center: DOBRUDJA_COORDS,
  zoom: isSmallScreen ? 12.2 : 13
});
fieldMap.addControl(new maplibregl.NavigationControl());
const draw = new MapLibreGlDraw({ displayControlsDefault: false, controls: { polygon: true, trash: true } });
fieldMap.addControl(draw);
fieldMap.on("load", () => {
  void loadSavedFields();
});
fieldMap.on("draw.create", updateArea);
fieldMap.on("draw.update", updateArea);
fieldMap.on("draw.delete", updateArea);

function toFeature(row) {
  if (!row || !row.geometry || typeof row.geometry !== "object") return null;
  const geom = row.geometry;
  if (!geom.type || !geom.coordinates) return null;
  return {
    type: "Feature",
    geometry: geom,
    properties: {
      id: row.id || "",
      name: row.name || "Unnamed field",
      crop: row.crop || "",
      area: row.area_decares || 0,
      notes: row.notes || "",
      created_at: row.created_at || ""
    }
  };
}

function renderSavedFields(features) {
  const fc = { type: "FeatureCollection", features };
  if (fieldMap.getSource(SAVED_FIELDS_SOURCE_ID)) {
    fieldMap.getSource(SAVED_FIELDS_SOURCE_ID).setData(fc);
    return;
  }
  fieldMap.addSource(SAVED_FIELDS_SOURCE_ID, { type: "geojson", data: fc });
  fieldMap.addLayer({
    id: SAVED_FIELDS_FILL_LAYER_ID,
    type: "fill",
    source: SAVED_FIELDS_SOURCE_ID,
    paint: {
      "fill-color": "#22c55e",
      "fill-opacity": 0.16
    }
  });
  fieldMap.addLayer({
    id: SAVED_FIELDS_LINE_LAYER_ID,
    type: "line",
    source: SAVED_FIELDS_SOURCE_ID,
    paint: {
      "line-color": "#16a34a",
      "line-width": 2.2
    }
  });

  fieldMap.on("mouseenter", SAVED_FIELDS_FILL_LAYER_ID, () => {
    fieldMap.getCanvas().style.cursor = "pointer";
  });
  fieldMap.on("mouseleave", SAVED_FIELDS_FILL_LAYER_ID, () => {
    fieldMap.getCanvas().style.cursor = "";
  });
  fieldMap.on("click", SAVED_FIELDS_FILL_LAYER_ID, (event) => {
    const feature = event.features && event.features[0];
    if (!feature) return;
    const props = feature.properties || {};
    const name = String(props.name || "Unnamed field");
    const crop = String(props.crop || "-");
    const area = String(props.area || "-");
    const notes = String(props.notes || "").trim();
    const createdRaw = String(props.created_at || "");
    const created = createdRaw ? new Date(createdRaw).toLocaleString("bg-BG") : "-";
    const coords =
      event.lngLat && Number.isFinite(event.lngLat.lng) && Number.isFinite(event.lngLat.lat)
        ? [event.lngLat.lng, event.lngLat.lat]
        : null;
    if (!coords) return;
    const html =
      "<div style='min-width:190px;color:#0f172a;font-size:12px;line-height:1.45;'>" +
      "<div style='font-weight:700;font-size:13px;margin-bottom:6px;'>" + name + "</div>" +
      "<div><strong>Култура:</strong> " + crop + "</div>" +
      "<div><strong>Площ:</strong> " + area + " дка</div>" +
      "<div><strong>Създадено:</strong> " + created + "</div>" +
      (notes ? "<div style='margin-top:6px;'><strong>Бележки:</strong> " + notes + "</div>" : "") +
      "</div>";
    new maplibregl.Popup({ closeButton: true, closeOnClick: true })
      .setLngLat(coords)
      .setHTML(html)
      .addTo(fieldMap);
  });
}

async function loadSavedFields() {
  try {
    const res = await fetch("/api/fields");
    const payload = await res.json();
    if (!res.ok || !payload.ok || !Array.isArray(payload.fields)) {
      throw new Error(payload && payload.error ? payload.error : "Неуспешно зареждане");
    }
    const features = payload.fields.map(toFeature).filter(Boolean);
    renderSavedFields(features);
  } catch (err) {
    console.error("[FieldWatch] loadSavedFields failed:", err);
  }
}
function calculatePolygonArea(coords) {
  let area = 0;
  for (let i = 0; i < coords.length - 1; i += 1) {
    const p1 = coords[i], p2 = coords[i + 1];
    area += p1[0] * p2[1] - p2[0] * p1[1];
  }
  return Math.abs(area / 2) * 111320 * 111320 * Math.cos((43.6 * Math.PI) / 180);
}
function updateArea() {
  const data = draw.getAll();
  const areaDisplay = document.getElementById("calculated-area");
  if (!data.features.length) { areaDisplay.textContent = "0.00 дка"; window.currentFieldGeoJSON = null; return; }
  const polygon = data.features[0].geometry.coordinates[0];
  const sqm = calculatePolygonArea(polygon);
  areaDisplay.textContent = (sqm / 1000).toFixed(2) + " дка";
  window.currentFieldGeoJSON = data.features[0];
}
document.getElementById("save-btn").addEventListener("click", () => {
  void saveField();
});
let bearing = -20;
if (!isSmallScreen) {
  setInterval(() => { bearing += 0.03; heroMap.setBearing(bearing); }, 120);
}

async function saveField() {
  const statusEl = document.getElementById("save-status");
  const saveBtn = document.getElementById("save-btn");
  if (!window.currentFieldGeoJSON) {
    statusEl.textContent = "Моля, очертайте поле първо.";
    statusEl.style.color = "#f87171";
    return;
  }
  const fieldName = document.getElementById("field-name").value.trim();
  const crop = document.getElementById("crop-type").value;
  const notes = document.getElementById("field-notes").value.trim();
  if (!fieldName || !crop) {
    statusEl.textContent = "Попълнете име на поле и култура.";
    statusEl.style.color = "#f59e0b";
    return;
  }

  const areaText = document.getElementById("calculated-area").textContent || "0";
  const areaDecares = Number.parseFloat(areaText.replace(",", "."));

  saveBtn.disabled = true;
  statusEl.textContent = "Записвам полето...";
  statusEl.style.color = "#94a3b8";

  try {
    const res = await fetch("/api/fields", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: fieldName,
        crop,
        notes,
        areaDecares,
        geometry: window.currentFieldGeoJSON.geometry
      })
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      throw new Error(data.error || "Неуспешен запис");
    }
    statusEl.textContent = "Полето е запазено успешно.";
    statusEl.style.color = "#10b981";
    void loadSavedFields();
  } catch (err) {
    statusEl.textContent = "Грешка при запис: " + (err && err.message ? err.message : "неизвестна");
    statusEl.style.color = "#f87171";
  } finally {
    saveBtn.disabled = false;
  }
}
</script>
</body>
</html>
